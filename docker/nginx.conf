server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA routing ────────────────────────────────────────────────
    # Todas las rutas que no son archivos físicos devuelven index.html
    # Angular Router maneja la navegación en el browser
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # ── Proxy hacia la API .NET ────────────────────────────────────
    # El browser llama a /api/* → nginx lo reenvía internamente al
    # contenedor "api" → SIN cruzar orígenes (no hay CORS desde el browser)
    location /api/ {
        proxy_pass          http://api:80/api/;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout  60s;
    }

    # ── Caché de assets estáticos ──────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Compresión ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
